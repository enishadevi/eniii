name: Secret Demo Workflow
on: [push]

jobs:
  display-secret-example:
    runs-on: ubuntu-latest
    steps:
      - name: Use secret as an environment variable
        shell: bash
        env:
          # Mapping the GitHub Secret to a local environment variable
          MY_APP_SECRET: ${{ secrets.api_key }}
        run: |
          echo "The secret is available in this step as \$MY_APP_SECRET"
          # Note: GitHub will print '***' if you try to echo the secret directly.
